    <circle class="media-anim__coal-active" cx="36"  cy="100" r="6" />
    <circle class="media-anim__coal-active" cx="42"  cy="126" r="6" />
    <circle class="media-anim__coal-active" cx="58"  cy="146" r="6" />
    <circle class="media-anim__coal-active" cx="78"  cy="160" r="6" />
    <circle class="media-anim__coal-active" cx="100" cy="165" r="6" />
  </g>
  <g class="media-anim__grate-lines">
    <line class="media-anim__grate" x1="32" y1="78"  x2="168" y2="78" />
