<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" class="media-anim media-anim--kettle media-anim--snake" role="img" aria-labelledby="sn-title sn-desc" preserveAspectRatio="xMidYMid meet">
  <title id="sn-title">Snake Method layout</title>
  <desc id="sn-desc">Top view of a kettle grill with unlit coals arranged in a C-shape along the inside wall and a glow travelling slowly from one end to the other.</desc>
