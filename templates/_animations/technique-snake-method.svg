    <circle class="media-anim__coal-unlit" cx="78"  cy="40"  r="6" />
    <circle class="media-anim__coal-unlit" cx="58"  cy="54"  r="6" />
    <circle class="media-anim__coal-unlit" cx="42"  cy="74"  r="6" />
    <circle class="media-anim__coal-unlit" cx="36"  cy="100" r="6" />
    <circle class="media-anim__coal-unlit" cx="42"  cy="126" r="6" />
    <circle class="media-anim__coal-unlit" cx="58"  cy="146" r="6" />
    <circle class="media-anim__coal-unlit" cx="78"  cy="160" r="6" />
    <circle class="media-anim__coal-unlit" cx="100" cy="165" r="6" />
